<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Look Test & Lotto</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <button id="theme-toggle" class="theme-toggle">🌙</button>
    <main class="container">
        <h1 class="title">Animal Look Test</h1>
        <p class="description">Choose a method to see if you look like a dog or a cat!</p>
        
        <section class="animal-test-section">
            <div class="test-options">
                <button type="button" class="option-btn active" onclick="showOption('webcam')">Webcam</button>
                <button type="button" class="option-btn" onclick="showOption('upload')">Upload Photo</button>
            </div>

            <div id="webcam-option" class="test-option-content">
                <button type="button" class="test-btn" id="webcam-start-btn" onclick="initAnimalModel()">Start Webcam</button>
                <div id="webcam-container" class="webcam-container"></div>
            </div>

            <div id="upload-option" class="test-option-content" style="display: none;">
                <div class="upload-area" id="upload-area">
                    <input type="file" id="image-upload" accept="image/*" hidden>
                    <div class="upload-label">
                        <span>Click or Drag & Drop Photo</span>
                    </div>
                    <img id="image-preview" src="#" alt="Preview" style="display: none;">
                </div>
                <button type="button" class="test-btn" id="predict-btn" onclick="predictImage()">Analyze Uploaded Photo</button>
            </div>

            <div id="label-container" class="label-container"></div>
        </section>

        <hr class="divider">

        <h1 class="title">Lotto Number Generator</h1>
        <section class="number-display"></section>
        <button class="generate-btn">Generate Numbers</button>
        
        <hr class="divider">
        
        <section class="contact-section">
            <h2 class="subtitle">Affiliate Inquiry</h2>
            <form action="https://formspree.io/f/xaqdpeev" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="How can we collaborate?"></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </section>

        <hr class="divider">

        <section class="comment-section">
            <h2 class="subtitle">Comments</h2>
            <div id="disqus_thread"></div>
            <script>
                (function() { 
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-emzmgzo8r4.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
